<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة ذكر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { width: 85%; text-align: center; }
        h2 { margin-bottom: 25px; color: #f1f1f1; font-size: 24px; }
        .btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.96); }
        /* تدرجات الألوان الاحترافية */
        .blue-grade { background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); }
        .green-grade { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .orange-grade { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); }
        .red-grade { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
    </style>
</head>
<body>
    <div class="container">
        <h2>قائمة ذكر الملونة ✨</h2>
        <button class="btn blue-grade" onclick="send('choose_reader')">🎧 اختيار القارئ</button>
        <button class="btn green-grade" onclick="send('get_azkar')">📿 أذكار المسلم</button>
        <button class="btn orange-grade" onclick="send('get_dua')">🤲 أدعية مختارة</button>
        <button class="btn red-grade" onclick="tg.close()">❌ إغلاق القائمة</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // لفتح الصفحة كاملة
        function send(data) {
            tg.sendData(data); // إرسال الداتا للبوت
        }
    </script>
</body>
</html>
